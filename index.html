  {data:"20/10/2026",mes:"Outubro",tipo:"Imersão",area:"E-commerce",nome:"ECBR Imersão Porto Alegre / RS",desc:"Imersão regional ECBR em Porto Alegre/RS para profissionais de e-commerce e marketing digital do Sul do Brasil.",preco:"Acessível (consultar)",link:"https://eventos.ecommercebrasil.com.br/"},
  {data:"10/11/2026",mes:"Novembro",tipo:"Imersão",area:"E-commerce",nome:"ECBR Imersão Recife / PE",desc:"Imersão regional ECBR em Recife/PE para profissionais de e-commerce e marketing digital do Nordeste.",preco:"Acessível (consultar)",link:"https://eventos.ecommercebrasil.com.br/"},
  {data:"17/11/2026",mes:"Novembro",tipo:"Summit",area:"E-commerce",nome:"ECBR Summit Plataformas",desc:"Summit sobre plataformas de e-commerce: headless commerce, integrações, escolha de stack tecnológico e tendências de arquitetura.",preco:"Acessível (consultar)",link:"https://eventos.ecommercebrasil.com.br/"},
  {data:"Jan/2027",mes:"Janeiro",tipo:"Conferência",area:"E-commerce",nome:"NRF Retail's Big Show 2027 – New York",desc:"Maior evento de varejo do mundo (Nova York). Tendências globais, IA no varejo, CX, omnichannel, personalização e tecnologia de ponta.",preco:"US$1.500+ (presencial)",link:"https://nrfbigshow.nrf.com/"},
  {data:"Mar/2027",mes:"Março",tipo:"Conferência",area:"CRM",nome:"RD Summit 2027 – Brasil",desc:"Principal evento de marketing digital, CRM e vendas do Brasil retorna reformulado em 2027. Growth, IA, dados, automação e estratégia.",preco:"R$1.000 – R$3.000 (aprox.)",link:"https://rdsummit.com.br/"},

// Normalizar: gerar ID slugificado
function slugify(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"").slice(0,80); }
const events = EVENTOS_RAW.map(e=>({...e, id:slugify(e.nome)}));

/* ═══════════════════════════════════════
   ESTADO
═══════════════════════════════════════ */
let sb       = null;
let presence = {};
let userName = localStorage.getItem("agenda_username")||"";
let pending  = null;
let fArea    = "all";
let fTipo    = "all";

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
let _tt; function toast(msg,icon="✓"){ const el=document.getElementById("toast"); el.textContent=`${icon}  ${msg}`; el.classList.add("show"); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove("show"),2800); }

/* ═══════════════════════════════════════
   NOME / MODAL
═══════════════════════════════════════ */
function syncBtn(){ const ic=document.getElementById("nIcon"),tx=document.getElementById("nText"); if(userName){ic.textContent="👋";tx.textContent=`Olá, ${userName}`;}else{ic.textContent="👤";tx.textContent="Definir meu nome";} }
function openModal(){ document.getElementById("nameInput").value=userName||""; document.getElementById("nameModal").classList.add("open"); setTimeout(()=>document.getElementById("nameInput").focus(),80); }
function closeModal(){ document.getElementById("nameModal").classList.remove("open"); }
document.getElementById("nameBtn").addEventListener("click",openModal);
document.getElementById("cancelBtn").addEventListener("click",()=>{ closeModal(); pending=null; });
document.getElementById("saveBtn").addEventListener("click",doSave);
document.getElementById("nameInput").addEventListener("keydown",e=>{ if(e.key==="Enter") doSave(); });
document.getElementById("nameModal").addEventListener("click",e=>{ if(e.target===document.getElementById("nameModal")){ closeModal(); pending=null; } });
function doSave(){ const v=document.getElementById("nameInput").value.trim(); if(!v){ document.getElementById("nameInput").focus(); return; } userName=v; localStorage.setItem("agenda_username",v); syncBtn(); closeModal(); toast(`Nome salvo: ${v}`,"👋"); if(pending){ const p=pending; pending=null; handlePresence(p.id,p.s); } }

/* ═══════════════════════════════════════
   SUPABASE
═══════════════════════════════════════ */
function initSB(){ try{ sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY); return true; }catch(e){ console.error(e); return false; } }
async function loadPresence(){
  if(!sb){ loadLocal(); return; }
  try{
    const {data,error}=await sb.from("presencas").select("*");
    if(error) throw error;
    presence={};
    (data||[]).forEach(r=>{ if(!presence[r.evento_id]) presence[r.evento_id]=[]; presence[r.evento_id].push({name:r.nome,status:r.status}); });
  }catch(e){ console.error(e); loadLocal(); }
}
function loadLocal(){ try{ presence=JSON.parse(localStorage.getItem("agenda_presence")||"{}"); }catch{ presence={}; } }
function saveLocal(){ localStorage.setItem("agenda_presence",JSON.stringify(presence)); }
async function upsertP(id,name,status){
  _setL(id,name,status); renderBadges(); updateCounters();
  if(!sb){ saveLocal(); return; }
  try{ const {error}=await sb.from("presencas").upsert({evento_id:id,nome:name,status},{onConflict:"evento_id,nome"}); if(error) throw error; }catch(e){ console.error(e); toast("Erro ao salvar 😕","⚠️"); }
}
async function deleteP(id,name){
  _delL(id,name); renderBadges(); updateCounters();
  if(!sb){ saveLocal(); return; }
  try{ const {error}=await sb.from("presencas").delete().eq("evento_id",id).eq("nome",name); if(error) throw error; }catch(e){ console.error(e); }
}
function _setL(id,name,status){ if(!presence[id]) presence[id]=[]; const i=presence[id].findIndex(p=>p.name===name); if(i>=0) presence[id][i].status=status; else presence[id].push({name,status}); }
function _delL(id,name){ if(presence[id]) presence[id]=presence[id].filter(p=>p.name!==name); }
function subscribeRT(){
  if(!sb) return;
  sb.channel("presencas_rt").on("postgres_changes",{event:"*",schema:"public",table:"presencas"},payload=>{
    const {eventType:et,new:n,old:o}=payload;
    if(et==="INSERT"||et==="UPDATE") _setL(n.evento_id,n.nome,n.status);
    if(et==="DELETE") _delL(o.evento_id,o.nome);
    renderBadges(); updateCounters();
  }).subscribe();
}

/* ═══════════════════════════════════════
   PRESENÇA
═══════════════════════════════════════ */
function handlePresence(id,s){ if(!userName){ pending={id,s}; openModal(); return; } if(s==="nao"){ deleteP(id,userName); toast("Presença removida","✕"); }else{ upsertP(id,userName,s); toast(s==="vou"?"Marcado 'Vou'! 🎉":"Marcado 'Talvez' 🤔",s==="vou"?"✓":"🛈"); } syncButtons(id); }
function myStatus(id){ if(!userName||!presence[id]) return null; return (presence[id].find(p=>p.name===userName)||{}).status||null; }

/* ═══════════════════════════════════════
   ESTILO
═══════════════════════════════════════ */
function areaClass(a){ const v=(a||"").toLowerCase(); if(v.includes("crm")) return "area-crm"; if(v.includes("cx")) return "area-cx"; if(v.includes("growth")) return "area-growth"; if(v.includes("e-commerce")||v.includes("ecommerce")) return "area-ecommerce"; if(v.includes("market")) return "area-marketing"; if(v.includes("inova")||v.includes("tech")) return "area-inovacao"; if(v.includes("social")) return "area-social"; if(v.includes("multi")) return "area-multi"; return "area-default"; }
function priceClass(p){ const v=(p||"").toLowerCase(); if(v.includes("stream")) return "preco-stream"; if(v.includes("gratuit")) return "preco-free"; if(v.includes("consultar")||v.includes("acess")) return "preco-consul"; return "preco-pago"; }
function priceIcon(p){ const v=(p||"").toLowerCase(); if(v.includes("stream")) return "📺"; if(v.includes("gratuit")) return "🆓"; if(v.includes("consultar")||v.includes("acess")) return "💬"; return "💰"; }

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function cardHTML(evt){
  const st=myStatus(evt.id);
  const going=(presence[evt.id]||[]).filter(p=>p.status==="vou");
  const maybe=(presence[evt.id]||[]).filter(p=>p.status==="talvez");
  const badges=[...going.map(p=>`<span class="badge-going">✓ ${esc(p.name)}</span>`),...maybe.map(p=>`<span class="badge-maybe">? ${esc(p.name)}</span>`)].join("");
  const ac=areaClass(evt.area), pc=priceClass(evt.preco), pi=priceIcon(evt.preco);
  return `
<article class="event-card" style="border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:11px" data-id="${evt.id}">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap">
    <div style="display:flex;flex-wrap:wrap;gap:5px">
      <span class="tipo-pill ${ac}">${esc(evt.area)}</span>
      <span class="tipo-pill tipo-plain">${esc(evt.tipo)}</span>
    </div>
    <div style="display:flex;gap:4px;flex-shrink:0">
      <button class="btn-pres btn-going${st==="vou"?" active":""}" data-id="${evt.id}" data-s="vou">✓ Vou</button>
      <button class="btn-pres btn-maybe${st==="talvez"?" active":""}" data-id="${evt.id}" data-s="talvez">🛈 Talvez</button>
      <button class="btn-pres btn-no${st==="nao"?" active":""}" data-id="${evt.id}" data-s="nao">✕ Não</button>
    </div>
  </div>
  <h3 class="fd" style="color:#F1F5F9;font-size:.96rem;font-weight:700;line-height:1.35">
    <a href="${esc(evt.link)}" target="_blank" rel="noopener" style="color:#F1F5F9;transition:color .18s;text-decoration:none" onmouseover="this.style.color='#FF5A2E'" onmouseout="this.style.color='#F1F5F9'">${esc(evt.nome)}</a>
  </h3>
  <p class="desc">${esc(evt.desc)}</p>
  <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px">
    <span style="font-size:.73rem;color:#374151;display:flex;align-items:center;gap:3px">📅 ${esc(evt.data)}</span>
    <span class="tipo-pill ${pc}" style="font-size:.66rem">${pi} ${esc(evt.preco)}</span>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:5px;min-height:0" data-badges="${evt.id}">${badges}</div>
</article>`;
}

function getFiltered(){ return events.filter(e=>{ const okA=fArea==="all"||(e.area||"").toLowerCase().includes(fArea); const okT=fTipo==="all"||(e.tipo||"").toLowerCase()===fTipo; return okA&&okT; }); }

const MONTH_ORDER=["Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Janeiro","Março","Ano todo"];
function renderEvents(){
  const grid=document.getElementById("eventsGrid");
  const list=getFiltered();
  if(!list.length){ grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#374151"><p style="font-size:2rem;margin-bottom:10px">📭</p><p class="fd" style="font-weight:600">Nenhum evento encontrado</p></div>`; return; }
  const byMonth={};
  list.forEach(e=>{ const m=e.mes||"Outros"; if(!byMonth[m]) byMonth[m]=[]; byMonth[m].push(e); });
  const sorted=Object.keys(byMonth).sort((a,b)=>{ const ia=MONTH_ORDER.indexOf(a),ib=MONTH_ORDER.indexOf(b); return (ia===-1?99:ia)-(ib===-1?99:ib); });
  let html="";
  sorted.forEach(m=>{ html+=`<div class="month-divider" style="grid-column:1/-1">${m}</div>`; html+=byMonth[m].map(cardHTML).join(""); });
  grid.innerHTML=html;
  grid.querySelectorAll(".btn-pres").forEach(btn=>btn.addEventListener("click",()=>handlePresence(btn.dataset.id,btn.dataset.s)));
}

function renderBadges(){ events.forEach(evt=>{ const a=document.querySelector(`[data-badges="${evt.id}"]`); if(!a) return; const going=(presence[evt.id]||[]).filter(p=>p.status==="vou"); const maybe=(presence[evt.id]||[]).filter(p=>p.status==="talvez"); a.innerHTML=[...going.map(p=>`<span class="badge-going">✓ ${esc(p.name)}</span>`),...maybe.map(p=>`<span class="badge-maybe">? ${esc(p.name)}</span>`)].join(""); syncButtons(evt.id); }); }
function syncButtons(id){ const st=myStatus(id); document.querySelectorAll(`[data-id="${id}"][data-s]`).forEach(btn=>btn.classList.toggle("active",btn.dataset.s===st)); }
function updateCounters(){ document.getElementById("cTotal").textContent=`${events.length} eventos`; const n=Object.values(presence).flat().filter(p=>p.status==="vou").length; document.getElementById("cGoing").textContent=`${n} marcado${n!==1?"s":""} como 'vou'`; }

function buildFilters(){
  const areas=[...new Set(events.map(e=>e.area).filter(Boolean))].sort();
  const tipos=[...new Set(events.map(e=>e.tipo).filter(Boolean))].sort();
  const fa=document.getElementById("filterArea");
  areas.forEach(a=>{ const b=document.createElement("button"); b.className="ftab"; b.dataset.a=a.toLowerCase(); b.textContent=a; fa.appendChild(b); });
  fa.querySelectorAll(".ftab").forEach(b=>b.addEventListener("click",()=>{ fa.querySelectorAll(".ftab").forEach(x=>x.classList.remove("active")); b.classList.add("active"); fArea=b.dataset.a; renderEvents(); }));
  const ft=document.getElementById("filterTipo");
  tipos.forEach(t=>{ const b=document.createElement("button"); b.className="ftab"; b.dataset.t=t.toLowerCase(); b.textContent=t; ft.appendChild(b); });
  ft.querySelectorAll(".ftab").forEach(b=>b.addEventListener("click",()=>{ ft.querySelectorAll(".ftab").forEach(x=>x.classList.remove("active")); b.classList.add("active"); fTipo=b.dataset.t; renderEvents(); }));
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
async function init(){
  syncBtn(); initSB();
  await loadPresence();
  buildFilters(); renderEvents(); updateCounters(); subscribeRT();
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
